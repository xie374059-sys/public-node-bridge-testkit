name: local-demo

on:
  push:
  pull_request:

jobs:
  local-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: |
          python -m py_compile node_bridge_testkit/__init__.py node_bridge_testkit/relay.py node_bridge_testkit/mock_node.py node_bridge_testkit/node_adapter.py node_bridge_testkit/avatar_runtime.py run_local_demo.py run_node_c_preflight.py install_node_c_avatar.py run_node_c_avatar.py run_remote_relay_demo.py send_node_c_remote_probe.py send_node_c_file_probe.py send_node_c_task_package_probe.py send_node_c_desktop_manual_probe.py run_node_c_remote_client.py run_node_c_codex_cli_probe.py run_node_c_desktop_manual_client.py run_node_c_task_package_preflight.py run_agent_handshake_card_preflight.py run_node_c_desktop_visible_preflight.py make_agent_handshake_card.py connect_node.py
      - name: Run local demo
        run: |
          python run_local_demo.py
      - name: Run Node-C preflight
        run: |
          python run_node_c_preflight.py
      - name: Install and run Node-C avatar
        run: |
          python install_node_c_avatar.py
          python run_node_c_avatar.py
      - name: Run remote relay simulation
        run: |
          python run_remote_relay_demo.py
      - name: Run Node-C task package preflight
        run: |
          python run_node_c_task_package_preflight.py
      - name: Run agent handshake card preflight
        run: |
          python run_agent_handshake_card_preflight.py
